name: 'External Workflow Trigger & Wait'
description: 'Generic utility for triggering external workflows and waiting for their completion'

inputs:
  github_token:
    description: 'GitHub token for API access'
    required: true
  target_repo:
    description: 'Target repository (owner/repo) for external workflow'
    required: true
  workflow_file:
    description: 'Workflow file to trigger (e.g., my-workflow.yml)'
    required: true
  workflow_ref:
    description: 'Git ref to trigger the workflow on'
    required: false
    default: 'main'
  workflow_name:
    description: 'Descriptive name for this workflow (used in logging)'
    required: false
    default: 'External Workflow'
  workflow_inputs:
    description: 'JSON object containing inputs to pass to the target workflow'
    required: false
    default: '{}'
  max_wait_time:
    description: 'Maximum wait time in seconds'
    required: true
  check_interval:
    description: 'Check interval in seconds'
    required: true
  outputs_artifact_name:
    description: 'Name of artifact containing job outputs JSON (optional). If provided, the action will download this artifact and expose its contents as output.'
    required: false
    default: ''

outputs:
  status:
    description: 'Final status of the workflow (completed, timeout, error). "error" is set when a run-detail API call fails.'
    value: ${{ steps.wait_for_workflow.outputs.status }}
  conclusion:
    description: 'Final conclusion (success, failure, cancelled, timeout, error, etc.). "error" is set when a run-detail API call fails.'
    value: ${{ steps.wait_for_workflow.outputs.conclusion }}
  run_id:
    description: 'The workflow run ID'
    value: ${{ steps.trigger_workflow.outputs.run_id }}
  run_url:
    description: 'Direct URL to the workflow run'
    value: ${{ steps.trigger_workflow.outputs.run_url }}
  job_outputs:
    description: 'JSON string containing all outputs from the artifact (empty object if no artifact or retrieval failed)'
    value: ${{ steps.retrieve_outputs.outputs.job_outputs }}
  has_outputs:
    description: 'Boolean indicating if outputs were successfully retrieved from artifact'
    value: ${{ steps.retrieve_outputs.outputs.has_outputs }}

runs:
  using: 'composite'
  steps:
    - name: Trigger external workflow
      id: trigger_workflow
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        TARGET_REPO: ${{ inputs.target_repo }}
        WORKFLOW_FILE: ${{ inputs.workflow_file }}
        WORKFLOW_REF: ${{ inputs.workflow_ref }}
        WORKFLOW_NAME: ${{ inputs.workflow_name }}
        WORKFLOW_INPUTS: ${{ inputs.workflow_inputs }}
      run: |
        # Validate inputs that flow into API URL paths
        if [[ ! "$TARGET_REPO" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
          echo "::error::invalid target_repo format"; exit 1
        fi
        if [[ ! "$WORKFLOW_FILE" =~ ^[A-Za-z0-9_.-]+\.ya?ml$ ]]; then
          echo "::error::invalid workflow_file format"; exit 1
        fi

        echo "🚀 Triggering '$WORKFLOW_NAME' workflow..."
        echo "📋 Target: ${TARGET_REPO}/${WORKFLOW_FILE}"
        echo "🌿 Ref: $WORKFLOW_REF"

        workflow_inputs="$WORKFLOW_INPUTS"
        if [ -z "$workflow_inputs" ] || [ "$workflow_inputs" = "{}" ]; then
          has_custom_inputs=0
          echo "📝 No custom workflow inputs provided"
        else
          # Validate that workflow_inputs is a JSON object (not array, string, null, etc.)
          inputs_type=$(printf '%s' "$workflow_inputs" | jq -r 'type' 2>/dev/null || echo "invalid")
          if [ "$inputs_type" != "object" ]; then
            echo "::error::workflow_inputs must be a JSON object (got: $inputs_type)"
            exit 1
          fi
          has_custom_inputs=1
          echo "📝 Custom workflow inputs provided"
        fi

        # Build the API request body
        request_body=$(mktemp)
        if [ "$has_custom_inputs" = "1" ]; then
          if ! printf '%s' "$workflow_inputs" | jq \
            --arg ref "$WORKFLOW_REF" \
            '{ref: $ref, inputs: .}' > "$request_body"; then
            echo "::error::failed to build dispatch request body from workflow_inputs"
            rm -f "$request_body"
            exit 1
          fi
        else
          jq -n --arg ref "$WORKFLOW_REF" '{ref: $ref}' > "$request_body"
        fi

        # Capture dispatch time (UTC) before triggering so we can filter
        # the resulting run by created_at and avoid picking up a run from
        # a concurrent dispatch. We back-date by 10 seconds to tolerate
        # small clock skew between the runner and GitHub's servers (which
        # populate created_at). Try GNU date first (Linux runners), then
        # BSD date (macOS runners); fall back to no buffer as a last resort.
        if dispatch_time=$(date -u -d '10 seconds ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null); then
          :
        elif dispatch_time=$(date -u -v -10S +%Y-%m-%dT%H:%M:%SZ 2>/dev/null); then
          :
        else
          dispatch_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        fi

        # Trigger the workflow
        if ! gh api \
          --method POST \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          --input "$request_body" \
          "/repos/${TARGET_REPO}/actions/workflows/${WORKFLOW_FILE}/dispatches"; then
          echo "❌ Failed to trigger workflow"
          rm -f "$request_body"
          exit 1
        fi
        rm -f "$request_body"
        echo "✅ '$WORKFLOW_NAME' workflow triggered"

        # Resolve the dispatched run by polling and filtering on created_at.
        # The GitHub Runs API does not expose dispatch inputs, so we
        # approximate identity by selecting the oldest workflow_dispatch run
        # created at or after our dispatch_time. We also match head_branch
        # when WORKFLOW_REF is a branch ref (refs/heads/*) or a bare name
        # that does not look like a commit SHA. Tag refs, full SHAs, and
        # other ref forms leave the filter empty since head_branch is not
        # populated for those dispatches.
        case "$WORKFLOW_REF" in
          refs/heads/*) head_branch_filter="${WORKFLOW_REF#refs/heads/}" ;;
          refs/tags/*)  head_branch_filter="" ;;
          *)
            if [[ "$WORKFLOW_REF" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
              head_branch_filter=""
            else
              head_branch_filter="$WORKFLOW_REF"
            fi
            ;;
        esac

        # Persist the last lookup error to a file so it survives subshell calls.
        LOOKUP_ERROR_FILE=$(mktemp)
        : > "$LOOKUP_ERROR_FILE"

        # runs_lookup <branch_filter>  -> on success prints "<filtered_id>|<unfiltered_id>"
        # to stdout, where each side is empty if no candidate was found. On failure
        # writes stderr to $LOOKUP_ERROR_FILE and returns 1. Computing both ids in
        # the same jq pass lets the caller fall back to the unfiltered match when
        # WORKFLOW_REF is e.g. a tag-name with empty head_branch, without burning
        # the entire polling window before retrying.
        runs_lookup() {
          local filter="$1"
          local stderr_file stdout
          stderr_file=$(mktemp)
          if stdout=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${TARGET_REPO}/actions/workflows/${WORKFLOW_FILE}/runs?event=workflow_dispatch&per_page=10" \
            2>"$stderr_file"); then
            printf '%s' "$stdout" | jq -r \
              --arg min_time "$dispatch_time" \
              --arg branch "$filter" \
              '([.workflow_runs[]? | select(.created_at >= $min_time)]) as $all |
               (($all | map(select($branch == "" or .head_branch == $branch)) | sort_by(.created_at) | .[0].id // "") | tostring) as $f |
               (($all | sort_by(.created_at) | .[0].id // "") | tostring) as $u |
               "\($f)|\($u)"'
            rm -f "$stderr_file"
            return 0
          fi
          cp "$stderr_file" "$LOOKUP_ERROR_FILE"
          rm -f "$stderr_file"
          return 1
        }

        # Poll until we either find a filtered match or exhaust attempts. The
        # filtered match is preferred because it is more likely to be the run
        # we just dispatched; the unfiltered match is tracked alongside as a
        # fallback for tag/SHA refs (where head_branch is typically empty).
        max_attempts=20
        attempt=0
        run_id=""
        last_unfiltered_id=""
        while [ $attempt -lt $max_attempts ] && [ -z "$run_id" ]; do
          attempt=$((attempt + 1))
          sleep 3
          if ! lookup_result=$(runs_lookup "$head_branch_filter"); then
            continue
          fi
          filtered_id="${lookup_result%%|*}"
          unfiltered_id="${lookup_result#*|}"
          if [ -n "$filtered_id" ] && [ "$filtered_id" != "null" ]; then
            run_id="$filtered_id"
          elif [ -n "$unfiltered_id" ] && [ "$unfiltered_id" != "null" ]; then
            last_unfiltered_id="$unfiltered_id"
          fi
        done

        # If we never matched the filter but did see at least one workflow_dispatch
        # run created after dispatch_time, accept that as our run. This covers
        # tag-name refs and any other case where head_branch does not match
        # WORKFLOW_REF, without forcing a separate fallback polling phase.
        if [[ -z "$run_id" || "$run_id" == "null" || ! "$run_id" =~ ^[0-9]+$ ]] \
          && [ -n "$last_unfiltered_id" ] && [[ "$last_unfiltered_id" =~ ^[0-9]+$ ]]; then
          echo "⚠️  No run matched head_branch=$head_branch_filter; using closest workflow_dispatch run by created_at"
          run_id="$last_unfiltered_id"
        fi

        if [[ -z "$run_id" || "$run_id" == "null" || ! "$run_id" =~ ^[0-9]+$ ]]; then
          echo "::error::could not resolve dispatched workflow run id (dispatched at $dispatch_time)"
          if [ -s "$LOOKUP_ERROR_FILE" ]; then
            echo "::error::last gh api error: $(cat "$LOOKUP_ERROR_FILE")"
          fi
          rm -f "$LOOKUP_ERROR_FILE"
          exit 1
        fi
        rm -f "$LOOKUP_ERROR_FILE"

        run_url="https://github.com/${TARGET_REPO}/actions/runs/$run_id"

        echo "📋 Latest '$WORKFLOW_NAME' workflow run ID: $run_id"
        echo "🔗 Direct URL: $run_url"

        echo "run_id=$run_id" >> $GITHUB_OUTPUT
        echo "run_url=$run_url" >> $GITHUB_OUTPUT

    - name: Wait for workflow completion
      id: wait_for_workflow
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        RUN_ID: ${{ steps.trigger_workflow.outputs.run_id }}
        RUN_URL: ${{ steps.trigger_workflow.outputs.run_url }}
        WORKFLOW_NAME: ${{ inputs.workflow_name }}
        MAX_WAIT_TIME: ${{ inputs.max_wait_time }}
        CHECK_INTERVAL: ${{ inputs.check_interval }}
        TARGET_REPO: ${{ inputs.target_repo }}
      run: |
        # Validate inputs that flow into API URL paths
        if [[ ! "$TARGET_REPO" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
          echo "::error::invalid target_repo format"; exit 1
        fi

        # Validate numeric inputs used in arithmetic
        if [[ ! "$MAX_WAIT_TIME" =~ ^[0-9]+$ ]]; then
          echo "::error::invalid max_wait_time"; exit 1
        fi
        if [[ ! "$CHECK_INTERVAL" =~ ^[0-9]+$ ]]; then
          echo "::error::invalid check_interval"; exit 1
        fi
        if [ "$MAX_WAIT_TIME" -le 0 ]; then
          echo "::error::max_wait_time must be greater than 0"; exit 1
        fi
        if [ "$CHECK_INTERVAL" -le 0 ]; then
          echo "::error::check_interval must be greater than 0"; exit 1
        fi
        if [ "$CHECK_INTERVAL" -gt "$MAX_WAIT_TIME" ]; then
          echo "::error::check_interval must be less than or equal to max_wait_time"; exit 1
        fi

        run_id="$RUN_ID"
        run_url="$RUN_URL"

        if [[ -z "$run_id" || "$run_id" == "null" || ! "$run_id" =~ ^[0-9]+$ ]]; then
          echo "::error::invalid run_id output from trigger_workflow: '$run_id'"
          exit 1
        fi

        echo "⏳ Waiting for '$WORKFLOW_NAME' workflow run $run_id to complete..."
        echo "📊 Max wait time: ${MAX_WAIT_TIME}s, Check interval: ${CHECK_INTERVAL}s"
        echo "🔗 Monitor at: $run_url"

        # Setup signal handler to cancel external workflow on termination
        cleanup_and_cancel() {
          echo ""
          echo "🚨 Cancellation detected! Attempting to cancel external workflow..."
          echo "🔄 Cancelling workflow run $run_id..."

          cancel_result=$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${TARGET_REPO}/actions/runs/$run_id/cancel" 2>&1 || echo "CANCEL_FAILED")

          if [[ "$cancel_result" == *"CANCEL_FAILED"* ]]; then
            echo "⚠️  Could not cancel external workflow (may already be completed)"
            echo "🔗 Check status manually at: $run_url"
          else
            echo "✅ External workflow cancellation requested successfully"
            echo "🔗 Verify cancellation at: $run_url"
          fi

          echo "🏁 Cleanup completed. Exiting..."
          exit 1
        }

        # Register signal handlers (primary cancellation mechanism)
        trap cleanup_and_cancel SIGTERM SIGINT

        elapsed_time=0

        while [ $elapsed_time -lt $MAX_WAIT_TIME ]; do
          # Get workflow run details
          if ! run_data=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${TARGET_REPO}/actions/runs/$run_id" 2>&1); then
            echo "::error::failed to fetch run details for $run_id: $run_data"
            echo "🔗 Check status manually at: $run_url"
            echo "status=error" >> $GITHUB_OUTPUT
            echo "conclusion=error" >> $GITHUB_OUTPUT
            exit 1
          fi

          run_status=$(echo "$run_data" | jq -r '.status')
          run_conclusion=$(echo "$run_data" | jq -r '.conclusion')

          echo "📈 Status: $run_status | Conclusion: $run_conclusion | Elapsed: ${elapsed_time}s"

          # Check if workflow is completed
          if [ "$run_status" = "completed" ]; then
            echo "🏁 '$WORKFLOW_NAME' workflow completed with conclusion: $run_conclusion"

            # Output results for GitHub Actions
            echo "status=$run_status" >> $GITHUB_OUTPUT
            echo "conclusion=$run_conclusion" >> $GITHUB_OUTPUT

            # Exit with appropriate code based on conclusion
            if [ "$run_conclusion" = "success" ]; then
              echo "✅ '$WORKFLOW_NAME' workflow passed!"
              exit 0
            else
              echo "❌ '$WORKFLOW_NAME' workflow failed with conclusion: $run_conclusion"
              echo "🔗 Check details at: $run_url"
              exit 1
            fi
          fi

          # Wait before next check
          sleep "$CHECK_INTERVAL"
          elapsed_time=$((elapsed_time + CHECK_INTERVAL))
        done

        # Timeout reached
        echo "⏰ Timeout reached waiting for '$WORKFLOW_NAME' workflow completion"
        echo "🔗 Check status at: $run_url"
        echo "status=timeout" >> $GITHUB_OUTPUT
        echo "conclusion=timeout" >> $GITHUB_OUTPUT
        exit 1

    - name: Retrieve job outputs from artifact
      id: retrieve_outputs
      if: always() && inputs.outputs_artifact_name != '' && steps.trigger_workflow.outputs.run_id != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        RUN_ID: ${{ steps.trigger_workflow.outputs.run_id }}
        ARTIFACT_NAME: ${{ inputs.outputs_artifact_name }}
        TARGET_REPO: ${{ inputs.target_repo }}
      run: |
        # Validate inputs that flow into API URL paths
        if [[ ! "$TARGET_REPO" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
          echo "::error::invalid target_repo format"; exit 1
        fi

        run_id="$RUN_ID"
        artifact_name="$ARTIFACT_NAME"

        if [[ -z "$run_id" || "$run_id" == "null" || ! "$run_id" =~ ^[0-9]+$ ]]; then
          echo "::error::invalid run_id: '$run_id'"
          exit 1
        fi

        echo "📦 Attempting to retrieve outputs from artifact: $artifact_name"
        echo "🔗 Workflow run ID: $run_id"

        # Initialize outputs
        job_outputs=""
        has_outputs="false"

        # List artifacts for the workflow run. Capture stderr separately so a
        # successful call with stderr noise can not corrupt the JSON we feed
        # to jq later.
        echo "🔍 Listing artifacts for workflow run..."
        artifacts_stderr=$(mktemp)
        if ! artifacts=$(gh api \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "/repos/${TARGET_REPO}/actions/runs/$run_id/artifacts" 2>"$artifacts_stderr"); then
          echo "⚠️  Failed to list artifacts for workflow run"
          if [ -s "$artifacts_stderr" ]; then
            echo "ℹ️  gh stderr:"
            cat "$artifacts_stderr"
          fi
          rm -f "$artifacts_stderr"
          echo "has_outputs=false" >> $GITHUB_OUTPUT
          echo "job_outputs={}" >> $GITHUB_OUTPUT
          exit 0
        fi
        rm -f "$artifacts_stderr"

        # Find artifact by name
        artifact_id=$(echo "$artifacts" | jq -r \
          --arg name "$artifact_name" \
          '.artifacts[] | select(.name == $name) | .id')

        if [ -z "$artifact_id" ] || [ "$artifact_id" = "null" ]; then
          echo "⚠️  Artifact '$artifact_name' not found in workflow run"
          echo "ℹ️  Available artifacts:"
          echo "$artifacts" | jq -r '.artifacts[] | "  - \(.name)"'
          echo "has_outputs=false" >> $GITHUB_OUTPUT
          echo "job_outputs={}" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "✅ Found artifact with ID: $artifact_id"
        echo "📥 Downloading artifact..."

        # Download artifact zip. stderr must NOT be merged into outputs.zip
        # because any warning from gh would corrupt the archive.
        download_stderr=$(mktemp)
        if ! gh api \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "/repos/${TARGET_REPO}/actions/artifacts/$artifact_id/zip" \
          > outputs.zip 2>"$download_stderr"; then
          echo "❌ Failed to download artifact"
          if [ -s "$download_stderr" ]; then
            echo "ℹ️  gh stderr:"
            cat "$download_stderr"
          fi
          rm -f "$download_stderr" outputs.zip
          echo "has_outputs=false" >> $GITHUB_OUTPUT
          echo "job_outputs={}" >> $GITHUB_OUTPUT
          exit 0
        fi
        rm -f "$download_stderr"

        echo "📦 Extracting artifact..."

        # Extract artifact
        if ! unzip -q outputs.zip -d outputs_dir 2>&1; then
          echo "❌ Failed to extract artifact"
          rm -rf outputs.zip outputs_dir
          echo "has_outputs=false" >> $GITHUB_OUTPUT
          echo "job_outputs={}" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Find JSON file in extracted contents
        json_file=$(find outputs_dir -name "*.json" -type f | head -1)

        if [ -z "$json_file" ]; then
          echo "⚠️  No JSON file found in artifact"
          echo "ℹ️  Artifact contents:"
          find outputs_dir -type f
          rm -rf outputs.zip outputs_dir
          echo "has_outputs=false" >> $GITHUB_OUTPUT
          echo "job_outputs={}" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "📄 Found JSON file: $(basename "$json_file")"
        echo "🔍 Reading outputs..."

        # Read and validate JSON
        job_outputs=$(cat "$json_file")

        if echo "$job_outputs" | jq empty 2>/dev/null; then
          echo "✅ Successfully retrieved and validated outputs"
          echo "📊 Output summary:"
          echo "$job_outputs" | jq -C '.' || echo "$job_outputs"

          # Compact JSON for output
          compacted_json=$(echo "$job_outputs" | jq -c '.')

          echo "has_outputs=true" >> $GITHUB_OUTPUT
          echo "job_outputs=$compacted_json" >> $GITHUB_OUTPUT
          has_outputs="true"
        else
          echo "❌ Invalid JSON in artifact"
          echo "has_outputs=false" >> $GITHUB_OUTPUT
          echo "job_outputs={}" >> $GITHUB_OUTPUT
        fi

        # Cleanup
        rm -rf outputs.zip outputs_dir

        if [ "$has_outputs" = "true" ]; then
          echo "🎉 Job outputs retrieval completed successfully"
        else
          echo "⚠️  Job outputs retrieval completed with warnings"
        fi

    - name: Cleanup on cancellation
      if: cancelled()
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        RUN_ID: ${{ steps.trigger_workflow.outputs.run_id }}
        RUN_URL: ${{ steps.trigger_workflow.outputs.run_url }}
        TARGET_REPO: ${{ inputs.target_repo }}
      run: |
        # Validate inputs that flow into API URL paths
        if [[ ! "$TARGET_REPO" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
          echo "::error::invalid target_repo format"; exit 1
        fi

        run_id="$RUN_ID"
        run_url="$RUN_URL"

        if [ -n "$run_id" ] && [ "$run_id" != "null" ] && [[ "$run_id" =~ ^[0-9]+$ ]]; then
          echo "🧹 Workflow was cancelled. Attempting to cancel external workflow..."
          echo "🔄 Cancelling external workflow run $run_id..."
          
          cancel_result=$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${TARGET_REPO}/actions/runs/$run_id/cancel" 2>&1 || echo "CANCEL_FAILED")
          
          if [[ "$cancel_result" == *"CANCEL_FAILED"* ]]; then
            echo "⚠️  Could not cancel external workflow (may already be completed or cancelled)"
          else
            echo "✅ External workflow cancellation requested"
          fi
          
          echo "🔗 Check final status at: $run_url"
        else
          echo "ℹ️  No external workflow run ID available for cleanup"
        fi 
